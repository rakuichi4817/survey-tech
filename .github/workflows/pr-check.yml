name: PRチェック

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-check-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: 検査
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v5

      - name: miseをセットアップ
        uses: jdx/mise-action@v3
        with:
          install: true
          cache: true

      - name: 依存関係をインストール
        run: mise run ci-install

      - name: フォーマットを検査
        run: mise run format-check

      - name: 型とサイトを検査
        run: mise run check

      - name: 静的サイトをビルド
        run: mise run build
