name: GitHub Pagesへデプロイ

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: ビルド
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v5

      - name: miseをセットアップ
        uses: jdx/mise-action@v3
        with:
          install: true
          cache: true

      - name: 依存関係をインストール
        run: mise run ci-install

      - name: 型とサイトを検査
        run: mise run check

      - name: 静的サイトをビルド
        run: mise run build

      - name: GitHub Pagesを設定
        uses: actions/configure-pages@v5

      - name: Pages artifactをアップロード
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/dist

  deploy:
    name: デプロイ
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: GitHub Pagesへデプロイ
        id: deployment
        uses: actions/deploy-pages@v4
