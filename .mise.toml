[tools]
node = "24"
pnpm = "11.9.0"

[tasks.install]
description = "ワークスペースの依存関係をインストールする"
run = "pnpm install"

[tasks.ci-install]
description = "CI向けにlockfile固定で依存関係をインストールする"
run = "CI=true pnpm install --frozen-lockfile"

[tasks.sync]
description = "調査MarkdownをAstro Starlightのcontentディレクトリへ同期する"
run = "pnpm sync"

[tasks.dev]
description = "調査Markdownを同期してAstro Starlightの開発サーバーを起動する"
run = "pnpm site:dev"

[tasks.build]
description = "調査Markdownを同期して静的サイトをビルドする"
run = "pnpm site:build"

[tasks.preview]
description = "ビルド済み静的サイトをプレビューする"
run = "pnpm site:preview"

[tasks.format]
description = "Biomeでプロジェクトファイルを整形する"
run = "pnpm format"

[tasks.format-check]
description = "Biomeでファイルを書き換えずに整形状態を検査する"
run = "pnpm format:check"

[tasks.lint]
description = "Biomeでプロジェクトファイルをlintする"
run = "pnpm lint"

[tasks.check]
description = "lint、TypeScript、Astroの検査を実行する"
run = "pnpm check"

[tasks.typecheck]
description = "TypeScriptの検査を実行する"
run = "pnpm typecheck"

[tasks.site-check]
description = "StarlightサイトのAstro検査を実行する"
run = "pnpm site:check"
